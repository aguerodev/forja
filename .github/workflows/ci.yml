name: ci

on:
  pull_request:
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  doctrine-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node wiki/_meta/validate-graph.mjs --check

  plugin-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g @anthropic-ai/claude-code
      # `validate <dir>` checks the marketplace manifest only; the plugin
      # manifest must be validated by direct path as well.
      - run: claude plugin validate . --strict
      - run: claude plugin validate .claude-plugin/plugin.json --strict

  shell-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -e
          for f in hooks/scripts/*.sh bin/*.sh scripts/*.sh \
                   templates/project/deploy.sh \
                   templates/project/scripts/release/*.sh \
                   templates/project/scripts/db-backup.sh \
                   templates/project/ops/monitor.sh; do
            bash -n "$f"
          done

  # Fast gate: instantiation succeeds and the leftover-token gate stays clean.
  instantiate-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          bash scripts/forja-instantiate.sh /tmp/smoke \
            APP=ciapp PUBLIC_NAME=ciapp DOMAIN=ci.test \
            GH_ORG=org GH_REPO=repo NODE_VERSION=22 PG_MAJOR=17 \
            DB_USER=app DB_NAME=ciapp PROJECT_NAME="CI Smoke"

  # The plugin's core promise: an instantiated project passes its full gate.
  template-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          bash scripts/forja-instantiate.sh "$RUNNER_TEMP/proj" \
            APP=ciapp PUBLIC_NAME=ciapp DOMAIN=ci.test \
            GH_ORG=org GH_REPO=repo NODE_VERSION=22 PG_MAJOR=17 \
            DB_USER=app DB_NAME=ciapp PROJECT_NAME="CI Check"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
        working-directory: ${{ runner.temp }}/proj
      - run: pnpm run check
        working-directory: ${{ runner.temp }}/proj
