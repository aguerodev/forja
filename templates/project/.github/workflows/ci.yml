# CI = gates only (doctrine: wiki ops/08 + arq/07 - load `forja:doctrina`).
# The CI VERIFIES, it never deploys: no deploy job, no production secrets, no
# node credentials — the repo's production-secret surface is zero. Shipping
# is the operator's /forja:deploy command.
#
# PR gates (block the merge): check, integration, contract.
# Nightly metric (never blocks a PR): mutation.
name: ci

on:
  pull_request:
  schedule:
    - cron: "0 3 * * *" # nightly mutation metric (UTC)

permissions:
  contents: read

jobs:
  check:
    # The fast gate — the SAME `pnpm run check` you run locally (local = CI):
    # biome, prettier (tailwind class order), tsc, dependency-cruiser, vitest
    # unit, migration linter, pnpm audit.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      # A new commit invalidates the stale gate: cancel superseded runs.
      group: check-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      # pnpm/action-setup reads the version from `packageManager` in
      # package.json — declaring it twice here breaks the setup.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check

  integration:
    # Repository/table suites against a REAL Postgres — testcontainers spins
    # the same major as prod by itself; the runner only provides Docker.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  contract:
    # Schemathesis smoke (25 examples) against the OpenAPI document assembled
    # from the slices + the ONLY pre-merge `next build` of the system.
    # Migrations are applied for real against the service Postgres first.
    needs: check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:{{PG_MAJOR}}
        env:
          POSTGRES_USER: "{{DB_USER}}"
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: "{{DB_NAME}}"
        # drizzle-kit runs on the runner host, not in a container: the port
        # MUST be mapped or the migration cannot reach the database.
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # drizzle.config.ts two-source contract: env var first, secret second.
      DATABASE_URL: postgres://{{DB_USER}}:ci@localhost:5432/{{DB_NAME}}
      # src/core/config.ts fallback: each missing /run/secrets/<field> reads
      # the UPPERCASED env var. Same three fields as the ConfigSchema.
      DB_URL: postgres://{{DB_USER}}:ci@localhost:5432/{{DB_NAME}}
      SESSION_SECRET: ci-contract-session-secret-32-chars-min
      APP_BASE_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec drizzle-kit migrate
      # The only pre-merge next build (output: standalone).
      - run: pnpm build
      - name: Start the standalone server
        run: |
          cp -r .next/static .next/standalone/.next/static
          nohup env PORT=3000 HOSTNAME=127.0.0.1 node .next/standalone/server.js > server.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "app did not become healthy in 30s" >&2
          tail -n 50 server.log >&2 || true
          exit 1
      - name: Schemathesis smoke
        run: |
          curl -fsS http://localhost:3000/api/openapi.json -o openapi.json
          # Greenfield guard: with no public operations registered yet there
          # is no contract to fuzz — the smoke passes empty (same spirit as
          # the mutation job's empty first run).
          if [ "$(jq '.paths | length' openapi.json)" = "0" ]; then
            echo "no public operations registered yet - smoke passes empty"
            exit 0
          fi
          # The test:contract script uses the schemathesis 3.x CLI.
          pipx install "schemathesis<4"
          pnpm test:contract

  mutation:
    # Nightly quality METRIC, not a merge gate: a red run means surviving
    # mutants in touched domain/service code — a signal to act on, never a
    # PR blocker (it does not run on pull_request at all).
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/cache@v4 # persists incremental state between nightly runs
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ github.run_id }}
          restore-keys: stryker-incremental-
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:mutation
